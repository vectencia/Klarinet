name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build koboe
        run: ./gradlew :koboe:build

      - name: Run koboe tests
        run: ./gradlew :koboe:allTests

      - name: Build koboe Android
        run: ./gradlew :koboe:assembleDebug

      - name: Build koboe (iOS)
        run: ./gradlew :koboe:compileKotlinIosSimulatorArm64

      - name: Build koboe (macOS)
        run: ./gradlew :koboe:compileKotlinMacosArm64

      - name: Build demo app
        run: ./gradlew :demo:assembleDebug

      - name: Run Darwin tests (iOS Simulator)
        run: ./gradlew :koboe:iosSimulatorArm64Test
        continue-on-error: true

  android-instrumented-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          script: ./gradlew :koboe:connectedDebugAndroidTest
        continue-on-error: true
